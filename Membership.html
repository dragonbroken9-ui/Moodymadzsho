<!DOCTYPE html>
<html>
<head>
    <title>Bot Panel Membership - MoODyMadz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0a2342;
            color: white;
            min-height: 100vh;
            padding: 10px;
        }
        .header {
            background: linear-gradient(135deg, #fdb813 0%, #0056b3 100%);
            text-align: center;
            padding: 15px;
            color: black;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            font-style: italic;
            font-family: 'Brush Script MT', cursive;
        }
        .search-area {
            text-align: center;
            margin-bottom: 15px;
        }
        .search-btn {
            background: #0056b3;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        .container {
            background: #103464;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-x: auto;
        }
        .title {
            text-align: center;
            font-size: clamp(20px, 5vw, 22px);
            font-weight: bold;
            color: #fdb813;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
            min-width: 400px;
        }
        table, th, td {
            border: 2px solid #0056b3;
        }
        th, td {
            padding: 10px 5px;
            text-align: center;
            font-size: clamp(12px, 3vw, 14px);
        }
        th {
            background: #0a2342;
            color: #fdb813;
        }
        tr:nth-child(even) {
            background: rgba(255,255,255,0.05);
        }
        input {
            width: 100%;
            padding: 8px;
            background: #0a2342;
            border: 1px solid #0056b3;
            color: white;
            border-radius: 5px;
            text-align: center;
            font-size: clamp(12px, 3vw, 13px);
        }
        .action-btn {
            background: #fdb813;
            color: black;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            border: none;
            cursor: pointer;
            font-size: clamp(12px, 3vw, 13px);
        }
        .action-btn:hover {
            background: #0056b3;
            color: white;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
        }
        .delete-btn:hover {
            background: #cc0000;
        }
        .status-active {
            color: #4CAF50;
            font-weight: bold;
        }
        .status-expired {
            color: #ff4444;
            font-weight: bold;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
            padding-top: 80px;
        }
        .modal-content {
            background-color: #103464;
            margin: auto;
            padding: 20px;
            border: 3px solid #fdb813;
            width: 85%;
            max-width: 400px;
            border-radius: 15px;
            text-align: center;
        }
        .modal-content h2 {
            color: #fdb813;
            margin-bottom: 20px;
            font-size: clamp(18px, 5vw, 22px);
        }
        .option-btn {
            display: block;
            width: 90%;
            padding: 15px;
            margin: 10px auto;
            background: #fdb813;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: clamp(14px, 4vw, 16px);
            border: none;
            cursor: pointer;
        }
        .option-btn:hover {
            background: #0056b3;
            color: white;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: #fdb813;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🤖 BOT PANEL MEMBERSHIP 🤖</h1>
    </div>

    <div class="search-area">
        <button class="search-btn" onclick="searchMember()">🔍 SEARCH</button>
    </div>

    <!-- ADD MEMBER -->
    <div class="container">
        <div class="title">📋 ADD NEW MEMBER</div>
        <table id="addTable">
            <tr>
                <th>IGN</th>
                <th>OWNER</th>
                <th>DATE START</th>
                <th>ACTION</th>
            </tr>
            <tr>
                <td><input type="text" id="newIGN" placeholder="Enter IGN"></td>
                <td><input type="text" id="newOwner" placeholder="Enter Name"></td>
                <td><input type="date" id="newDate"></td>
                <td><button class="action-btn" onclick="addMember()">ADD</button></td>
            </tr>
        </table>
    </div>

    <!-- MEMBER LIST -->
    <div class="container">
        <div class="title">📋 ALL MEMBERS LIST</div>
        <table id="memberTable">
            <thead>
                <tr>
                    <th>IGN</th>
                    <th>OWNER</th>
                    <th>DATE OF EXPIRATION</th>
                    <th>STATUS</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- DYNAMIC ROWS -->
            </tbody>
        </table>
    </div>

    <!-- MODAL -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>MEMBER OPTIONS</h2>
            <p id="modal-ign">IGN: Name</p>
            <br>
            <button class="option-btn" onclick="extendSelected(30)">📅 1 MONTH - 30 DAYS</button>
            <button class="option-btn" onclick="extendSelected(180)">📅 6 MONTHS - 180 DAYS</button>
            <hr style="border:1px dashed #fdb813; margin:20px 0;">
            <button class="option-btn delete-btn" onclick="deleteSelected()">🗑️ DELETE</button>
        </div>
    </div>

    <script>
        // INITIALIZE EMPTY ARRAY
        if(!localStorage.getItem('botMembers')) {
            localStorage.setItem('botMembers', JSON.stringify([]));
        }

        let membersData = JSON.parse(localStorage.getItem('botMembers'));
        let selectedIndex = -1;

        // 🔥 FORMAT DATE TO DISPLAY 🔥
        function formatDate(dateObj) {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            let day = dateObj.getDate();
            let month = months[dateObj.getMonth()];
            let year = dateObj.getFullYear();
            return day + " " + month + " " + year;
        }

        // 🔥 CHECK STATUS 🔥
        function getStatus(expiryDateString) {
            var expDate = new Date(expiryDateString);
            var today = new Date();
            
            expDate.setHours(0,0,0,0);
            today.setHours(0,0,0,0);
            
            if (expDate < today) {
                return "<span class='status-expired'>EXPIRED</span>";
            } else {
                return "<span class='status-active'>ACTIVE</span>";
            }
        }

        // 🔥 DISPLAY ALL MEMBERS 🔥
        function displayMembers() {
            var tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";

            if(membersData.length == 0) {
                tableBody.innerHTML = "<tr><td colspan='5' style='color:#aaa;'>No members added yet</td></tr>";
                return;
            }

            membersData.forEach((member, index) => {
                var row = tableBody.insertRow();
                
                var cell1 = row.insertCell(0);
                var cell2 = row.insertCell(1);
                var cell3 = row.insertCell(2);
                var cell4 = row.insertCell(3);
                var cell5 = row.insertCell(4);

                cell1.innerHTML = member.ign;
                cell2.innerHTML = member.owner;
                cell3.innerHTML = formatDate(new Date(member.expiry));
                cell4.innerHTML = getStatus(member.expiry);
                cell5.innerHTML = "<button class='action-btn' onclick='openModal(" + index + ")'>VIEW</button>";
            });
        }

        // 🔥 ADD MEMBER 🔥
        function addMember() {
            var ign = document.getElementById("newIGN").value;
            var owner = document.getElementById("newOwner").value;
            var dateStartStr = document.getElementById("newDate").value;

            if (ign == "" || owner == "" || dateStartStr == "") {
                alert("Please fill all fields!");
                return;
            }

            var dateStart = new Date(dateStartStr);
            dateStart.setDate(dateStart.getDate() + 30);
            
            var expirySave = dateStart.toISOString().split('T')[0]; // Save as YYYY-MM-DD

            membersData.push({
                ign: ign,
                owner: owner,
                expiry: expirySave,
                status: "ACTIVE"
            });

            localStorage.setItem('botMembers', JSON.stringify(membersData));
            
            displayMembers();

            document.getElementById("newIGN").value = "";
            document.getElementById("newOwner").value = "";
            document.getElementById("newDate").value = "";

            alert("✅ Member Added!");
        }

        // 🔥 MODAL FUNCTIONS 🔥
        function openModal(index) {
            selectedIndex = index;
            var member = membersData[index];
            document.getElementById("modal-ign").innerHTML = "IGN: " + member.ign;
            document.getElementById("myModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }

        function extendSelected(daysToAdd) {
            if(selectedIndex === -1) return;

            var member = membersData[selectedIndex];
            var currentDate = new Date(member.expiry);
            currentDate.setDate(currentDate.getDate() + daysToAdd);
            
            member.expiry = currentDate.toISOString().split('T')[0];
            member.status = "ACTIVE";

            localStorage.setItem('botMembers', JSON.stringify(membersData));
            displayMembers();

            alert("✅ Extended!\nNew Expiry: " + formatDate(currentDate));
            closeModal();
        }

        function deleteSelected() {
            if(selectedIndex === -1) return;
            var ign = membersData[selectedIndex].ign;
            
            if(confirm("Delete " + ign + "?")) {
                membersData.splice(selectedIndex, 1);
                localStorage.setItem('botMembers', JSON.stringify(membersData));
                displayMembers();
                alert("🗑️ Deleted!");
                closeModal();
            }
        }

        function searchMember() {
            var searchText = prompt("Enter IGN to search:");
            if(searchText) {
                var found = membersData.find(m => m.ign.toLowerCase() == searchText.toLowerCase());
                if(found) {
                    alert("Found!\nIGN: " + found.ign + "\nOwner: " + found.owner + "\nExpiry: " + formatDate(new Date(found.expiry)) + "\nStatus: " + (new Date(found.expiry) < new Date() ? "EXPIRED" : "ACTIVE"));
                } else {
                    alert("Member not found!");
                }
            }
        }

        // RUN ON LOAD
        displayMembers();

        window.onclick = function(event) {
            if (event.target == document.getElementById("myModal")) {
                closeModal();
            }
        }
    </script>
    
<div style="text-align: center; margin: 20px 0;">
    <a href="https://chat.whatsapp.com/I0I2e2ctpbjENNF3eqYkmV" target="_blank">
        <button style="
            background: linear-gradient(45deg, #128C7E, #25D366);
            color: white; 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold;
            border: none; 
            border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        "
        onmouseover="this.style.transform='scale(1.05)'"
        onmouseout="this.style.transform='scale(1)'">
            🟢 JOIN MOODYMADZ SHOP GROUP 🟢
        </button>
    </a>
</div>
    
    
</body>
  </html>
